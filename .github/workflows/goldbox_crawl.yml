name: 쿠팡 골드박스 크롤링

on:
  schedule:
    # UTC 기준 (KST = UTC + 9)
    - cron: '0 22 * * *'   # KST 07:00 - 오픈 직후
    - cron: '0 3 * * *'    # KST 12:00 - 오전 소진 현황
    - cron: '0 9 * * *'    # KST 18:00 - 오후 현황
    - cron: '0 15 * * *'   # KST 00:00 - 심야 현황
    - cron: '50 21 * * *'  # KST 06:50 - 마감 직전
  workflow_dispatch:  # 수동 실행 가능

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: crawler/requirements.txt

      - name: Chrome 설치
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: 의존성 설치
        run: pip install -r crawler/requirements.txt

      - name: 골드박스 크롤링 실행
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python crawler/goldbox_crawler.py

      - name: 디버그 아티팩트 저장
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crawl-debug-${{ github.run_number }}
          path: |
            crawler/goldbox_*.json
            crawler/debug_page.html
          retention-days: 3
          if-no-files-found: ignore
