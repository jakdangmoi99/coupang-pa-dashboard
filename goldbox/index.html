<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>골드박스 트래커 | Seller HQ</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#07111f;--surf:#0d1c30;--surf2:#122238;--surf3:#162840;--border:#1a3050;--border2:#1e3860;--accent:#3d8ef8;--accent2:#00d4b4;--accent3:#7c6af7;--green:#00e09a;--yellow:#ffbe3d;--red:#ff4466;--orange:#ff8c42;--text:#e8f0fe;--text2:#7a9abf;--text3:#304560;--cs:0 2px 12px rgba(0,0,0,.3);--radius:12px;--gold:#ffbe3d}
[data-theme="light"]{--bg:#f0f4fa;--surf:#fff;--surf2:#f5f7fc;--surf3:#edf1f9;--border:#d0daea;--border2:#b8ccdf;--accent:#1a6ef5;--accent2:#00a896;--accent3:#6c5ce7;--green:#00875a;--yellow:#b45309;--red:#dc2626;--orange:#c05a00;--text:#0d1f36;--text2:#3d5c7a;--text3:#8ba4be;--cs:0 2px 12px rgba(0,0,0,.07);--gold:#d4a017}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;min-height:100vh;font-size:14px;transition:background .3s,color .3s}
[data-theme="dark"] body::before{content:"";position:fixed;inset:0;background:radial-gradient(ellipse 90% 60% at 15% 0%,rgba(61,142,248,.07) 0%,transparent 55%),radial-gradient(ellipse 70% 50% at 85% 100%,rgba(0,212,180,.05) 0%,transparent 55%);pointer-events:none;z-index:0}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--surf)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
a{color:inherit;text-decoration:none}

.app{max-width:1440px;margin:0 auto;padding:16px;position:relative;z-index:1}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid var(--border);margin-bottom:20px;flex-wrap:wrap;gap:12px}
.hd-left{display:flex;align-items:center;gap:12px}
.logo{width:42px;height:42px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.hd-title h1{font-size:20px;font-weight:800;letter-spacing:-.3px}
.hd-title p{font-size:12px;color:var(--text3);font-family:monospace;margin-top:2px}
.hd-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.hd-badge{background:var(--surf2);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:12px;color:var(--text2);font-family:monospace}
.hd-badge b{color:var(--accent2)}
.btn{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid var(--border);transition:all .2s;white-space:nowrap;background:transparent;color:var(--text2)}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn-pr{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none}
.btn-pr:hover{transform:translateY(-1px)}

/* Insight Panel */
.insight-panel{background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;margin-bottom:20px;position:relative;overflow:hidden}
.insight-panel::before{content:"";position:absolute;inset:0;border-radius:var(--radius);padding:1px;background:linear-gradient(135deg,rgba(61,142,248,.3),rgba(0,212,180,.3),rgba(124,106,247,.3));-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}
.insight-title{font-size:13px;font-weight:800;color:var(--accent);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.insight-list{display:grid;grid-template-columns:1fr 1fr;gap:6px 20px}
.insight-item{font-size:13px;color:var(--text2);line-height:1.6;display:flex;align-items:baseline;gap:6px}
.insight-item .dot{width:4px;height:4px;border-radius:50%;flex-shrink:0;margin-top:6px}

/* Stats Row */
.stats{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center;transition:border-color .2s}
.stat-card:hover{border-color:var(--accent)}
.stat-icon{font-size:18px;margin-bottom:4px}
.stat-card .val{font-size:26px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-card .lbl{font-size:11px;color:var(--text3);margin-top:2px;font-weight:600}

/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px}
.tab{padding:10px 20px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:none;background:transparent;color:var(--text3);transition:all .2s;white-space:nowrap}
.tab:hover{color:var(--text2);background:var(--surf2)}
.tab.on{background:rgba(61,142,248,.12);color:var(--accent)}

/* Filters */
.filters{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.filter-input{flex:1;min-width:180px;padding:9px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surf);color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border-color .2s}
.filter-input:focus{border-color:var(--accent)}
.filter-select{padding:9px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surf);color:var(--text);font-size:13px;font-family:inherit;outline:none;cursor:pointer;min-width:130px}
.filter-date{padding:9px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surf);color:var(--text);font-size:13px;font-family:inherit;outline:none;cursor:pointer}
.sort-btn{padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surf);color:var(--text2);font-size:13px;cursor:pointer;font-weight:600;transition:all .2s;white-space:nowrap}
.sort-btn:hover,.sort-btn.on{border-color:var(--accent);color:var(--accent)}
.sort-btn.fav-on{border-color:var(--gold);color:var(--gold);background:rgba(255,190,61,.08)}
.view-btn{padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surf);color:var(--text2);font-size:13px;cursor:pointer;font-weight:600;transition:all .2s;white-space:nowrap}
.view-btn:hover,.view-btn.on{border-color:var(--accent2);color:var(--accent2)}
.filter-count{font-size:12px;color:var(--text3);margin-left:4px;font-weight:600}

/* Table */
.table-wrapper{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border)}
.product-table{width:100%;border-collapse:collapse;background:var(--surf)}
.product-table thead{background:var(--surf2);position:sticky;top:0;z-index:2}
.product-table th{padding:10px 10px;text-align:left;font-size:11px;font-weight:700;color:var(--text2);border-bottom:2px solid var(--border);white-space:nowrap;text-transform:uppercase;letter-spacing:.3px}
.product-table td{padding:8px 10px;font-size:13px;border-bottom:1px solid var(--border)}
.product-table tbody tr{cursor:pointer;transition:background .15s}
.product-table tbody tr:hover{background:var(--surf2)}
.product-table .td-fav{width:32px;text-align:center;cursor:pointer}
.fav-star{font-size:16px;cursor:pointer;user-select:none;transition:transform .15s}
.fav-star:hover{transform:scale(1.2)}
.fav-star.on{color:var(--gold)}
.fav-star.off{color:var(--text3);opacity:.4}
.td-rank{font-weight:800;color:var(--accent);text-align:center;width:40px}
.td-brand{font-weight:700;white-space:nowrap;max-width:100px;overflow:hidden;text-overflow:ellipsis}
.td-name{max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.td-price{text-align:right;font-family:'DM Mono',monospace;white-space:nowrap;font-size:12px}
.td-rate{text-align:center;font-weight:700}
.td-discount{color:var(--red)}
.td-delivery{white-space:nowrap}
/* Sold rate mini bar in table cell */
.sold-cell{display:flex;align-items:center;gap:6px;min-width:100px}
.sold-minibar{flex:1;height:6px;background:var(--surf3);border-radius:3px;overflow:hidden;min-width:40px}
.sold-minibar-fill{height:100%;border-radius:3px;transition:width .4s}
.sold-minibar-fill.low{background:var(--green)}
.sold-minibar-fill.mid{background:var(--yellow)}
.sold-minibar-fill.high{background:linear-gradient(90deg,var(--orange),var(--red))}
.sold-pct{font-size:12px;font-weight:700;min-width:32px;text-align:right}
.sold-pct.low{color:var(--green)}
.sold-pct.mid{color:var(--yellow)}
.sold-pct.high{color:var(--red)}
/* Fav row highlight */
.fav-row{background:rgba(255,190,61,.04)!important;border-left:3px solid var(--gold)}
.fav-row:hover{background:rgba(255,190,61,.08)!important}
/* Category badge */
.cat-badge{display:inline-block;font-size:10px;padding:2px 6px;border-radius:4px;font-weight:700;background:var(--surf3);color:var(--text2);white-space:nowrap}
/* Delivery badge */
.dlv-badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:4px;font-weight:700}
.dlv-badge.rocket{background:rgba(61,142,248,.15);color:var(--accent)}
.dlv-badge.global{background:rgba(255,140,66,.15);color:var(--orange)}
.dlv-badge.tomorrow{background:rgba(0,224,154,.15);color:var(--green)}
.dlv-badge.wow{background:rgba(255,190,61,.15);color:var(--yellow)}
.dlv-badge.fresh{background:rgba(0,212,180,.15);color:var(--accent2)}
.dlv-badge.seller{background:rgba(124,106,247,.15);color:var(--accent3)}
.dlv-badge.normal{background:var(--surf2);color:var(--text3)}

/* Card Grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;margin-bottom:24px}
.card{background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:all .2s;cursor:pointer;position:relative}
.card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--cs)}
.card-img{width:100%;aspect-ratio:1;object-fit:cover;background:var(--surf2);display:block}
.card-body{padding:12px}
.card-brand{font-size:11px;color:var(--accent2);font-weight:700;margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px}
.card-name{font-size:13px;font-weight:600;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:36px;margin-bottom:8px}
.card-prices{display:flex;align-items:baseline;gap:6px;margin-bottom:8px}
.card-sale{font-size:18px;font-weight:800;color:var(--accent)}
.card-origin{font-size:12px;color:var(--text3);text-decoration:line-through}
.card-discount{background:var(--red);color:#fff;font-size:11px;font-weight:800;padding:2px 6px;border-radius:4px;position:absolute;top:10px;right:10px}
.card-fav{position:absolute;top:10px;left:10px;font-size:18px;cursor:pointer;z-index:1;text-shadow:0 1px 3px rgba(0,0,0,.4);user-select:none}
.card-fav:hover{transform:scale(1.2)}
.sold-bar{margin-top:8px}
.sold-bar .bar-bg{height:8px;background:var(--surf3);border-radius:4px;overflow:hidden}
.sold-bar .bar-fill{height:100%;border-radius:4px;transition:width .6s ease}
.bar-fill.low{background:var(--green)}
.bar-fill.mid{background:var(--yellow)}
.bar-fill.high{background:linear-gradient(90deg,var(--orange),var(--red))}
.sold-bar .bar-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-top:4px;font-weight:600}

/* Tab Content */
.tab-content{display:none}
.tab-content.active{display:block}

/* Brand Intel Cards */
.brand-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:20px}
.brand-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);padding:16px;transition:all .2s;cursor:pointer;position:relative}
.brand-card:hover{border-color:var(--accent);transform:translateY(-1px)}
.brand-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.brand-card-name{font-size:16px;font-weight:800}
.brand-card-remove{font-size:14px;color:var(--text3);cursor:pointer;padding:4px}
.brand-card-remove:hover{color:var(--red)}
.brand-card-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.brand-card-stat{text-align:center;padding:8px;background:var(--surf2);border-radius:6px}
.brand-card-stat .bv{font-size:18px;font-weight:800;color:var(--accent)}
.brand-card-stat .bl{font-size:10px;color:var(--text3);margin-top:2px}
.brand-card-stat.today .bv{color:var(--accent2)}
.brand-card-stat.absent .bv{color:var(--text3)}

/* Chart Section */
.chart-section{background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.chart-title{font-size:14px;font-weight:700;margin-bottom:14px;color:var(--text)}
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.chart-box{position:relative;height:300px}

/* Brand Search Result */
.brand-result{background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-top:16px}
.brand-header{display:flex;align-items:center;gap:16px;margin-bottom:16px;flex-wrap:wrap}
.brand-stat{text-align:center;padding:12px 20px;background:var(--surf2);border-radius:8px}
.brand-stat .bv{font-size:22px;font-weight:800;color:var(--accent)}
.brand-stat .bl{font-size:11px;color:var(--text3);margin-top:2px}
.brand-products{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-top:16px}
.brand-search-box{display:flex;gap:8px}

/* Empty / Loading */
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty .ico{font-size:48px;margin-bottom:12px}
.empty .msg{font-size:15px;font-weight:600}
.empty .sub{font-size:13px;margin-top:6px}
.loading{text-align:center;padding:60px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Responsive */
@media(max-width:768px){
  .app{padding:12px}
  .stats{grid-template-columns:repeat(3,1fr)}
  .insight-list{grid-template-columns:1fr}
  .grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
  .chart-row{grid-template-columns:1fr}
  .filters{flex-direction:column}
  .filter-input{min-width:100%}
  .brand-search-box{flex-direction:column}
  .brand-cards{grid-template-columns:repeat(auto-fill,minmax(180px,1fr))}
}
@media(max-width:400px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .grid{grid-template-columns:repeat(2,1fr);gap:8px}
}
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-content{background:var(--surf);border:1px solid var(--border);border-radius:16px;max-width:600px;width:100%;max-height:85vh;overflow-y:auto;padding:24px;position:relative;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.modal-close{position:absolute;top:12px;right:16px;background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer}
.modal-close:hover{color:var(--text1)}
.modal-product-name{font-size:15px;font-weight:700;margin-bottom:4px;padding-right:30px}
.modal-brand{font-size:13px;color:var(--accent);margin-bottom:16px}
.modal-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
.modal-stat{background:var(--bg3);border-radius:8px;padding:10px;text-align:center}
.modal-stat .mv{font-size:18px;font-weight:800}
.modal-stat .ml{font-size:10px;color:var(--text3);margin-top:2px}
.modal-timeline{margin-top:16px}
.modal-timeline-title{font-size:13px;font-weight:700;margin-bottom:10px}
.modal-timeline-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.modal-timeline-time{font-size:12px;font-weight:600;color:var(--text2);min-width:50px}
.modal-timeline-bar{flex:1;height:20px;background:var(--bg3);border-radius:4px;position:relative;overflow:hidden}
.modal-timeline-fill{height:100%;border-radius:4px;transition:width .3s}
.modal-timeline-val{font-size:12px;font-weight:700;min-width:40px;text-align:right}
</style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <div class="header">
    <div class="hd-left">
      <div class="logo">📦</div>
      <div class="hd-title">
        <h1>골드박스 트래커</h1>
        <p>Coupang GoldBox Tracker</p>
      </div>
    </div>
    <div class="hd-right">
      <div class="hd-badge">최근 수집 <b id="lastCrawl">-</b></div>
      <div class="hd-badge">상품 <b id="totalCount">0</b>개</div>
      <button class="btn" onclick="toggleTheme()">🌓</button>
      <button class="btn btn-pr" onclick="loadData()">새로고침</button>
    </div>
  </div>

  <!-- Insight Panel -->
  <div class="insight-panel" id="insightPanel" style="display:none">
    <div class="insight-title">📊 오늘의 하이라이트</div>
    <div class="insight-list" id="insightList"></div>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card"><div class="stat-icon">📦</div><div class="val" id="statProducts">-</div><div class="lbl">총 상품</div></div>
    <div class="stat-card"><div class="stat-icon">🏷️</div><div class="val" id="statAvgDiscount">-</div><div class="lbl">평균 할인율</div></div>
    <div class="stat-card"><div class="stat-icon">🔥</div><div class="val" id="statAvgSold">-</div><div class="lbl">평균 소진율</div></div>
    <div class="stat-card"><div class="stat-icon">🏢</div><div class="val" id="statBrands">-</div><div class="lbl">브랜드 수</div></div>
    <div class="stat-card"><div class="stat-icon">📂</div><div class="val" id="statCategories">-</div><div class="lbl">카테고리 수</div></div>
    <div class="stat-card"><div class="stat-icon">⭐</div><div class="val" id="statMyBrands">-</div><div class="lbl">내 관심 브랜드</div></div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab on" data-tab="today">오늘의 브리핑</button>
    <button class="tab" data-tab="brand">브랜드 인텔리전스</button>
    <button class="tab" data-tab="trend">시장 분석</button>
  </div>

  <!-- Tab 1: 오늘의 브리핑 -->
  <div class="tab-content active" id="tab-today">
    <div class="filters">
      <button class="sort-btn on" onclick="setDatePreset('today',this)">오늘</button>
      <button class="sort-btn" onclick="setDatePreset('yesterday',this)">어제</button>
      <button class="sort-btn" onclick="setDatePreset('2days',this)">2일 전</button>
      <input type="date" class="filter-date" id="dateFilter" onchange="onDateChange()" title="직접 날짜 선택">
      <span style="border-left:1px solid var(--border);height:24px;margin:0 2px"></span>
      <input class="filter-input" id="searchInput" placeholder="상품명 또는 브랜드 검색..." oninput="filterProducts()">
      <select class="filter-select" id="deliveryFilter" onchange="filterProducts()">
        <option value="">전체 배송</option>
        <option value="로켓배송">로켓배송</option><option value="로켓직구">로켓직구</option>
        <option value="로켓내일">로켓내일</option><option value="로켓와우">로켓와우</option>
        <option value="로켓프레시">로켓프레시</option><option value="판매자로켓">판매자로켓</option>
        <option value="일반배송">일반배송</option>
      </select>
      <select class="filter-select" id="categoryFilter" onchange="filterProducts()">
        <option value="">전체 카테고리</option>
        <option value="푸드">푸드</option><option value="신선식품">신선식품</option>
        <option value="가전/디지털">가전/디지털</option><option value="패션의류/잡화">패션의류/잡화</option>
        <option value="뷰티/헬스">뷰티/헬스</option><option value="홈/키친">홈/키친</option>

<script>
// ══════════════════════════════════════
// Supabase
// ══════════════════════════════════════
const SUPABASE_URL='https://daukcarsixncmzhlhwok.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRhdWtjYXJzaXhuY216aGxod29rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMTE0ODMsImV4cCI6MjA5MDY4NzQ4M30.BPqX2gTq56JVMrEJRv9HYghYsKo7IpIW88Rc68J79G4';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

// ══════════════════════════════════════
// State
// ══════════════════════════════════════
let allProducts=[];
let currentSort='sold_rate';
let currentSortDir='desc';
let currentView='table';
let charts={};
let currentDate='';
let favBrands=new Set();
let favFilterOn=false;

// ══════════════════════════════════════
// Init
// ══════════════════════════════════════
document.addEventListener('DOMContentLoaded',async()=>{
  initTabs();
  await loadFavorites();
  currentDate=getKSTDate();
  document.getElementById('dateFilter').value=currentDate;
  loadData();
});

function initTabs(){
  document.querySelectorAll('.tab').forEach(t=>{
    t.addEventListener('click',()=>{
      document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
      document.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active'));
      t.classList.add('on');
      document.getElementById('tab-'+t.dataset.tab).classList.add('active');

      if(t.dataset.tab==='brand') renderFavSection();
    });

// ══════════════════════════════════════
// KST Date Helpers
// ══════════════════════════════════════
function getKSTDate(){
  const now=new Date();
  const kst=new Date(now.getTime()+9*60*60*1000);
  if(kst.getUTCHours()<7) kst.setUTCDate(kst.getUTCDate()-1);
  return kst.toISOString().split('T')[0];
}
function getGoldboxStartUTC(dateStr){
  const d=new Date(dateStr+'T00:00:00.000Z');
  d.setUTCDate(d.getUTCDate()-1);
  d.setUTCHours(22,0,0,0);
  return d.toISOString();
}
function getGoldboxEndUTC(dateStr){
  return dateStr+'T22:00:00.000Z';
}

function onDateChange(){
  currentDate=document.getElementById('dateFilter').value;
  // Clear preset button highlights
  document.querySelectorAll('#tab-today .filters .sort-btn[onclick^="setDatePreset"]').forEach(b=>b.classList.remove('on'));
  loadData();
}

function setDatePreset(preset,btn){
  document.querySelectorAll('#tab-today .filters .sort-btn[onclick^="setDatePreset"]').forEach(b=>b.classList.remove('on'));
  if(btn) btn.classList.add('on');
  const kstNow=new Date(Date.now()+9*3600000);
  if(kstNow.getUTCHours()<7) kstNow.setUTCDate(kstNow.getUTCDate()-1);
  const base=new Date(kstNow);
  if(preset==='yesterday') base.setUTCDate(base.getUTCDate()-1);
  else if(preset==='2days') base.setUTCDate(base.getUTCDate()-2);
  const dateStr=base.toISOString().split('T')[0];
  document.getElementById('dateFilter').value=dateStr;
  currentDate=dateStr;
  loadData();
}

// ══════════════════════════════════════
// Data Load
// ══════════════════════════════════════
async function loadData(){
  showLoading('productGrid');
  try{
    const targetDate=currentDate||getKSTDate();
    const startUTC=getGoldboxStartUTC(targetDate);
    const endUTC=getGoldboxEndUTC(targetDate);

    let{data:snapshots,error:sErr}=await sb
      .from('goldbox_snapshots').select('*')
      .gte('crawled_at',startUTC).lt('crawled_at',endUTC)
      .order('crawled_at',{ascending:false});
    if(sErr) throw sErr;

    // Fallback to latest data if none for target date
    if(!snapshots||!snapshots.length){
      const{data:latestSnap}=await sb
        .from('goldbox_snapshots').select('crawled_at')
        .order('crawled_at',{ascending:false}).limit(1);
      if(latestSnap&&latestSnap.length){
        const latestKST=new Date(new Date(latestSnap[0].crawled_at).getTime()+9*60*60*1000);
        let fallbackDate=latestKST.toISOString().split('T')[0];
        if(latestKST.getUTCHours()<7){const prev=new Date(latestKST);prev.setUTCDate(prev.getUTCDate()-1);fallbackDate=prev.toISOString().split('T')[0];}
        document.getElementById('dateFilter').value=fallbackDate;
        currentDate=fallbackDate;
        const{data:s2,error:e2}=await sb
          .from('goldbox_snapshots').select('*')
          .gte('crawled_at',getGoldboxStartUTC(fallbackDate)).lt('crawled_at',getGoldboxEndUTC(fallbackDate))
          .order('crawled_at',{ascending:false});
        if(!e2) snapshots=s2;
      }
    }

    if(!snapshots||!snapshots.length){
      showEmpty('productGrid','아직 골드박스 데이터가 없습니다','크롤링이 실행되면 자동으로 표시됩니다');
      updateStats([]);
      return;
    }

    // Build product map from snapshots
    const snapMap={};
    const soldByTime={};
    const timeLabels=new Set();

    snapshots.forEach(s=>{
      if(!snapMap[s.product_id]) snapMap[s.product_id]=s;
      const kstTime=new Date(new Date(s.crawled_at).getTime()+9*60*60*1000);
      const hh=String(kstTime.getUTCHours()).padStart(2,'0');
      const hourLabel=hh+'시';
      timeLabels.add(hourLabel);
      if(!soldByTime[s.product_id]) soldByTime[s.product_id]={};
      if(!soldByTime[s.product_id][hourLabel]) soldByTime[s.product_id][hourLabel]=s.sold_rate;
    });

    const sortedTimeLabels=[...timeLabels].sort();
    const productIds=[...new Set(Object.keys(snapMap))];
    const{data:products,error:pErr}=await sb
      .from('goldbox_products').select('*').in('product_id',productIds);
    if(pErr) throw pErr;

    const productMap={};
    (products||[]).forEach(p=>{productMap[p.product_id]=p;});

    allProducts=productIds.map((pid,idx)=>{
      const snap=snapMap[pid];
      const prod=productMap[pid]||{};
      let brand=prod.brand_name||'';
      if(!brand&&prod.product_name) brand=prod.product_name.trim().split(/\s+/)[0]||'';
      brand=brand.replace(/[^가-힣a-zA-Z0-9\s]/g,'').trim();
      const category=prod.category||classifyCategory(prod.product_name||'');
      return{
        ...prod,product_id:pid,brand_name:brand,category,
        original_price:snap.original_price||0,sale_price:snap.sale_price||0,
        discount_rate:snap.discount_rate||0,sold_rate:snap.sold_rate||0,
        crawled_at:snap.crawled_at||'',
        _index:snap.crawl_order||snap.id||idx+1,
        delivery_type:prod.delivery_type||'',
        _soldByTime:soldByTime[pid]||{},_timeLabels:sortedTimeLabels
      };
    });

    updateStats(allProducts);
    generateInsights(allProducts);

    if(allProducts.length&&allProducts[0].crawled_at){
      const d=new Date(allProducts[0].crawled_at);
      document.getElementById('lastCrawl').textContent=
        d.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Seoul'});
    }
    document.getElementById('totalCount').textContent=allProducts.length;
    filterProducts();
  }catch(err){
    console.error('데이터 로드 오류:',err);
    showEmpty('productGrid','데이터 로드 중 오류가 발생했습니다',err.message);
  }
}

// ══════════════════════════════════════
// Stats
// ══════════════════════════════════════
function updateStats(items){
  document.getElementById('statProducts').textContent=items.length||'-';
  if(items.length){
    const avgDiscount=Math.round(items.reduce((s,i)=>s+i.discount_rate,0)/items.length);
    const avgSold=Math.round(items.reduce((s,i)=>s+i.sold_rate,0)/items.length);
    const brands=new Set(items.filter(i=>i.brand_name).map(i=>i.brand_name));
    const cats=new Set(items.filter(i=>i.category).map(i=>i.category));
    const myBrandsToday=[...favBrands].filter(b=>items.some(i=>i.brand_name===b));
    document.getElementById('statAvgDiscount').textContent=avgDiscount+'%';
    document.getElementById('statAvgSold').textContent=avgSold+'%';
    document.getElementById('statBrands').textContent=brands.size;
    document.getElementById('statCategories').textContent=cats.size;
    document.getElementById('statMyBrands').textContent=myBrandsToday.length+'/'+favBrands.size;
  }else{
    ['statAvgDiscount','statAvgSold','statBrands','statCategories','statMyBrands'].forEach(id=>{
      document.getElementById(id).textContent='-';
    });
  }
}

// ══════════════════════════════════════
// Insights (Auto-generated)
// ══════════════════════════════════════
function generateInsights(items){
  const panel=document.getElementById('insightPanel');
  const list=document.getElementById('insightList');
  if(!items.length){panel.style.display='none';return;}
  panel.style.display='block';

  const insights=[];

  // Fastest selling
  const topSold=[...items].sort((a,b)=>b.sold_rate-a.sold_rate)[0];
  if(topSold) insights.push({color:'var(--red)',text:`가장 빨리 소진 중: <b>${esc(topSold.brand_name)}</b> ${esc(topSold.product_name?.substring(0,30))}... <b>${topSold.sold_rate}%</b> 소진`});

  // Deepest discount
  const topDisc=[...items].sort((a,b)=>b.discount_rate-a.discount_rate)[0];
  if(topDisc) insights.push({color:'var(--orange)',text:`최대 할인: <b>${esc(topDisc.brand_name)}</b> ${esc(topDisc.product_name?.substring(0,30))}... <b>${topDisc.discount_rate}% OFF</b>`});

  // My brands today
  const myBrandsToday=[...favBrands].filter(b=>items.some(i=>i.brand_name===b));
  if(favBrands.size>0){
    if(myBrandsToday.length>0){
      const details=myBrandsToday.map(b=>`${b} ${items.filter(i=>i.brand_name===b).length}건`).join(', ');
      insights.push({color:'var(--gold)',text:`내 관심 브랜드: <b>${details}</b>`});
    }else{
      insights.push({color:'var(--text3)',text:`내 관심 브랜드: 오늘 골드박스에 등장하지 않음`});
    }
  }

  // Top category
  const catCount={};
  items.forEach(p=>{const c=p.category||'기타';catCount[c]=(catCount[c]||0)+1;});
  const topCat=Object.entries(catCount).sort((a,b)=>b[1]-a[1])[0];
  if(topCat) insights.push({color:'var(--accent)',text:`오늘 핫 카테고리: <b>${topCat[0]}</b> (${topCat[1]}개, ${Math.round(topCat[1]/items.length*100)}%)`});

  // Hot products (sold > 80%)
  const hotCount=items.filter(i=>i.sold_rate>=80).length;
  if(hotCount>0) insights.push({color:'var(--red)',text:`소진율 80% 이상 상품: <b>${hotCount}개</b> (매진 임박)`});

  // Avg discount by delivery
  const rocketItems=items.filter(i=>i.delivery_type==='로켓배송');
  if(rocketItems.length>10){
    const rocketAvgSold=Math.round(rocketItems.reduce((s,i)=>s+i.sold_rate,0)/rocketItems.length);
    insights.push({color:'var(--accent2)',text:`로켓배송 평균 소진율: <b>${rocketAvgSold}%</b> (${rocketItems.length}개)`});
  }

  list.innerHTML=insights.slice(0,6).map(i=>`<div class="insight-item"><div class="dot" style="background:${i.color}"></div><span>${i.text}</span></div>`).join('');
}

// ══════════════════════════════════════
// Filter & Sort
// ══════════════════════════════════════
function filterProducts(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const delivery=document.getElementById('deliveryFilter').value;
  const cat=document.getElementById('categoryFilter').value;

  let filtered=allProducts.filter(p=>{
    if(q&&!p.product_name?.toLowerCase().includes(q)&&!(p.brand_name||'').toLowerCase().includes(q)) return false;
    if(delivery&&p.delivery_type!==delivery) return false;
    if(cat&&p.category!==cat) return false;
    if(favFilterOn&&!favBrands.has(p.brand_name)) return false;
    return true;
  });

  if(currentSort==='_index'){
    filtered.sort((a,b)=>currentSortDir==='asc'?b._index-a._index:a._index-b._index);
  }else{
    filtered.sort((a,b)=>{
      const va=a[currentSort]||0,vb=b[currentSort]||0;
      return currentSortDir==='desc'?vb-va:va-vb;
    });
  }

  document.getElementById('filterCount').textContent=
    filtered.length===allProducts.length?`${allProducts.length}개`:`${allProducts.length}개 중 ${filtered.length}개`;
  renderProducts(filtered);
}

function setSort(btn){
  const sortBtns=document.querySelectorAll('#tab-today .sort-btn:not(#favFilterBtn)');
  sortBtns.forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  const newSort=btn.dataset.sort;
  if(currentSort===newSort) currentSortDir=currentSortDir==='desc'?'asc':'desc';
  else{currentSort=newSort;currentSortDir='desc';}
  filterProducts();
}

function setView(btn){
  document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  currentView=btn.dataset.view;
  filterProducts();
}

// ══════════════════════════════════════
// Render Products
// ══════════════════════════════════════
function renderProducts(items){
  const container=document.getElementById('productGrid');
  if(!items.length){showEmpty('productGrid','검색 결과가 없습니다','다른 키워드로 검색해보세요');return;}
  if(currentView==='table'){container.className='';container.innerHTML=renderTable(items);}
  else{container.className='grid';container.innerHTML=items.map(p=>cardHTML(p)).join('');}
}

function soldClass(rate){return rate<40?'low':rate<70?'mid':'high';}
function dlvClass(d){return d==='로켓배송'?'rocket':d==='로켓직구'?'global':d==='로켓내일'?'tomorrow':d==='로켓와우'?'wow':d==='로켓프레시'?'fresh':d==='판매자로켓'?'seller':'normal';}
function fmtPrice(v){return v?v.toLocaleString()+'원':'-';}

function renderTable(items){
  const timeCols=items.length&&items[0]._timeLabels?items[0]._timeLabels:[];
  const hasMultiTime=timeCols.length>1;

  const rows=items.map((p,i)=>{
    const isFav=p.brand_name&&favBrands.has(p.brand_name);
    const sc=soldClass(p.sold_rate);

    let timeCells='';
    if(hasMultiTime){
      timeCells=timeCols.map(t=>{
        const val=p._soldByTime[t];
        if(val===undefined) return '<td class="td-rate" style="color:var(--text3)">-</td>';
        return `<td class="td-rate"><span class="sold-pct ${soldClass(val)}">${val}%</span></td>`;
      }).join('');
    }

    return `<tr class="${isFav?'fav-row':''}" onclick="openProductModal('${p.product_id}')" style="cursor:pointer">
      <td class="td-fav" onclick="event.stopPropagation();toggleFavorite('${esc(p.brand_name)}')"><span class="fav-star ${isFav?'on':'off'}">${isFav?'★':'☆'}</span></td>
      <td class="td-rank">${i+1}</td>
      <td class="td-brand" title="${esc(p.brand_name)}">${esc(p.brand_name)||'-'}</td>
      <td class="td-name" title="${esc(p.product_name)}">${esc(p.product_name)}</td>
      <td class="td-price">${fmtPrice(p.sale_price)}</td>
      <td class="td-rate td-discount">${p.discount_rate?p.discount_rate+'%':'-'}</td>
      <td><div class="sold-cell"><div class="sold-minibar"><div class="sold-minibar-fill ${sc}" style="width:${p.sold_rate}%"></div></div><span class="sold-pct ${sc}">${p.sold_rate}%</span></div></td>
      ${timeCells}
      <td class="td-delivery"><span class="dlv-badge ${dlvClass(p.delivery_type)}">${p.delivery_type||'-'}</span></td>
      <td><span class="cat-badge">${esc(p.category||'기타')}</span></td>
    </tr>`;
  }).join('');

  const timeHeaders=hasMultiTime?timeCols.map(t=>`<th>${t}</th>`).join(''):'';

  return `<div class="table-wrapper"><table class="product-table">
    <thead><tr>

}

async function loadFavorites(){
  try{
    const{data}=await sb.from('brand_favorites').select('brand_name').eq('user_id','default');
    favBrands=new Set((data||[]).map(d=>d.brand_name));
  }catch(e){console.error('즐겨찾기 로드 오류:',e);}
}

async function addFavorite(brandName){
  if(!brandName||favBrands.has(brandName)) return;
  try{
    await sb.from('brand_favorites').insert({brand_name:brandName,user_id:'default'});
    favBrands.add(brandName);
    onFavChange();
  }catch(e){console.error('즐겨찾기 추가 오류:',e);}
}

async function removeFavorite(brandName){
  if(!favBrands.has(brandName)) return;
  try{
    await sb.from('brand_favorites').delete().eq('brand_name',brandName).eq('user_id','default');
    favBrands.delete(brandName);
    onFavChange();
  }catch(e){console.error('즐겨찾기 삭제 오류:',e);}
}

function toggleFavorite(brandName){
  if(favBrands.has(brandName)) removeFavorite(brandName);
  else addFavorite(brandName);
}

function addFavManual(){
  const input=document.getElementById('favAddInput');
  const name=input.value.trim();
  if(!name) return;
  addFavorite(name);
  input.value='';
}

function onFavChange(){
  updateStats(allProducts);
  generateInsights(allProducts);

  updateFavFilterBtn();
  renderFavSection();
}

function toggleFavFilter(){

  updateFavFilterBtn();

function updateFavFilterBtn(){

async function loadFavCompareChart(){
  const section=document.getElementById('favCompareSection');
  const timeline=document.getElementById('favTimeline');
  if(favBrands.size<1){section.style.display='none';return;}
  section.style.display='block';
  timeline.innerHTML='<div style="text-align:center;padding:20px;color:var(--text3);font-size:13px">로딩 중...</div>';
  try{
    const brands=[...favBrands];
    // Use .or() with ilike for flexible brand matching
    const orFilter=brands.map(b=>`brand_name.ilike.%${b}%,product_name.ilike.%${b}%`).join(',');
    const{data:products}=await sb
      .from('goldbox_products').select('product_id,product_name,brand_name,category,image_url,product_url,first_seen_date,last_seen_date')
      .or(orFilter)
      .order('last_seen_date',{ascending:false})
      .limit(200);

    if(!products||!products.length){
      timeline.innerHTML='<div style="text-align:center;padding:20px;color:var(--text3);font-size:13px">아직 골드박스 등장 이력이 없습니다</div>';
      return;
    }

    // Get snapshots for discount/sold data
    const ids=products.map(p=>p.product_id);
    // Supabase .in() has a limit, batch if needed
    let snaps=[];
    for(let i=0;i<ids.length;i+=50){
      const batch=ids.slice(i,i+50);
      const{data:s}=await sb
        .from('goldbox_snapshots').select('product_id,discount_rate,sold_rate,sale_price,crawled_at')
        .in('product_id',batch).order('crawled_at',{ascending:false});
      if(s) snaps=snaps.concat(s);
    }

    const snapMap={};
    (snaps||[]).forEach(s=>{
      if(!snapMap[s.product_id]) snapMap[s.product_id]=[];
      snapMap[s.product_id].push(s);
    });

    // Group products by favorite brand (fuzzy match)
    const brandProducts={};
    brands.forEach(b=>{brandProducts[b]=[];});
    products.forEach(p=>{
      const matched=brands.find(b=>(p.brand_name&&(p.brand_name.includes(b)||b.includes(p.brand_name)))||(p.product_name&&p.product_name.includes(b)));
      if(matched) brandProducts[matched].push(p);
    });

    let html='';
    brands.forEach((brand,bi)=>{
      const prods=brandProducts[brand];
      if(!prods||!prods.length){
        html+=`<div class="card" style="margin-bottom:12px;padding:16px">
          <div style="font-weight:700;margin-bottom:4px">${esc(brand)}</div>
          <div style="color:var(--text3);font-size:12px">골드박스 등장 이력 없음</div>
        </div>`;
        return;
      }
      html+=`<div style="margin-bottom:16px">
        <div style="font-weight:700;font-size:14px;margin-bottom:8px;color:${chartColors[bi%chartColors.length]};display:flex;align-items:center;gap:6px">
          <span style="width:10px;height:10px;border-radius:50%;background:${chartColors[bi%chartColors.length]};display:inline-block"></span>
          ${esc(brand)} <span style="color:var(--text3);font-weight:400;font-size:12px">${prods.length}개 상품</span>
        </div>
        <div style="display:flex;flex-direction:column;gap:6px">`;

      prods.slice(0,10).forEach(p=>{
        const pSnaps=snapMap[p.product_id]||[];
        const latestSnap=pSnaps[0];
        const discount=latestSnap?latestSnap.discount_rate:null;
        const sold=latestSnap?latestSnap.sold_rate:null;
        const price=latestSnap?latestSnap.sale_price:null;
        const sc=sold!==null?soldClass(sold):'';
        const shortName=(p.product_name||'').length>50?p.product_name.substring(0,50)+'…':p.product_name;

        html+=`<div class="card" style="flex-direction:row;align-items:center;padding:10px 14px;gap:12px;cursor:pointer" onclick="openProduct('${p.product_url||''}')">
          ${p.image_url?`<img src="${p.image_url}" style="width:48px;height:48px;border-radius:6px;object-fit:cover;flex:none" loading="lazy" onerror="this.style.display='none'">`:''}
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(shortName)}</div>
            <div style="font-size:11px;color:var(--text3);margin-top:2px">
              ${p.first_seen_date===p.last_seen_date?p.last_seen_date:p.first_seen_date+' ~ '+p.last_seen_date}
              ${p.category?` · ${p.category}`:''}
            </div>
          </div>
          <div style="display:flex;gap:12px;align-items:center;flex:none">
            ${discount!==null?`<div style="text-align:center"><div style="font-size:14px;font-weight:700;color:#ff4466">${discount}%</div><div style="font-size:10px;color:var(--text3)">할인</div></div>`:''}
            ${sold!==null?`<div style="text-align:center"><div style="font-size:14px;font-weight:700;color:${sold>=60?'#ff4466':sold>=30?'#ffbe3d':'#00d4b4'}">${sold}%</div><div style="font-size:10px;color:var(--text3)">소진</div></div>`:''}
            ${price?`<div style="text-align:center"><div style="font-size:13px;font-weight:600">${fmtPrice(price)}</div><div style="font-size:10px;color:var(--text3)">판매가</div></div>`:''}
          </div>
        </div>`;
      });

      if(prods.length>10){
        html+=`<div style="text-align:center;padding:8px;color:var(--text3);font-size:12px">외 ${prods.length-10}개 상품 — 브랜드 검색에서 전체 보기</div>`;
      }
      html+=`</div></div>`;
    });

    timeline.innerHTML=html;
  }catch(e){console.error('브랜드 히스토리 오류:',e);}
}

// Trend Charts (Tab 3)
// ══════════════════════════════════════
let trendPeriod='today';
const chartColors=['#3d8ef8','#00d4b4','#7c6af7','#ffbe3d','#ff4466','#ff8c42','#00e09a','#a78bfa','#f472b6','#34d399','#818cf8','#fb923c'];
const deliveryColors={'로켓배송':'#3d8ef8','로켓내일':'#00e09a','로켓와우':'#ffbe3d','로켓프레시':'#00d4b4','로켓직구':'#ff8c42','판매자로켓':'#7c6af7','일반배송':'#304560','미확인':'#1a3050'};

function setTrendPeriod(btn){
  document.querySelectorAll('#tab-trend .sort-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  trendPeriod=btn.dataset.period;
  loadTrendCharts();
}

async function loadTrendCharts(){
  try{
    let trendProducts=[];
    let sinceStr='';

    if(trendPeriod==='today'){
      trendProducts=[...allProducts];
      document.getElementById('trendPeriodLabel').textContent=`(${currentDate} 기준 ${trendProducts.length}개 상품)`;
    }else{
      const now=new Date();
      if(trendPeriod==='7d'){now.setDate(now.getDate()-7);sinceStr=now.toISOString().split('T')[0];}
      else if(trendPeriod==='30d'){now.setDate(now.getDate()-30);sinceStr=now.toISOString().split('T')[0];}
      else{sinceStr='2000-01-01';}

      const{data:products}=await sb
        .from('goldbox_products').select('product_id,product_name,brand_name,category,delivery_type')
        .gte('last_seen_date',sinceStr);

      trendProducts=(products||[]).map(p=>({...p,category:p.category||classifyCategory(p.product_name||''),delivery_type:p.delivery_type||'미확인'}));
      const periodLabel=trendPeriod==='7d'?'최근 7일':trendPeriod==='30d'?'최근 30일':'전체';
      document.getElementById('trendPeriodLabel').textContent=`(${periodLabel} 기준 ${trendProducts.length}개 상품)`;
    }

    if(!trendProducts.length) return;
    const total=trendProducts.length;

    // 1. Category x delivery stacked bar with sold rate overlay
    const catDelivery={};
    const catSoldSum={};
    const catSoldCnt={};
    const allDeliveryTypes=new Set();
    trendProducts.forEach(p=>{
      const cat=p.category||'기타';
      const dt=p.delivery_type||'미확인';
      if(!catDelivery[cat]) catDelivery[cat]={};
      catDelivery[cat][dt]=(catDelivery[cat][dt]||0)+1;
      allDeliveryTypes.add(dt);
      if(p.sold_rate!==undefined){
        catSoldSum[cat]=(catSoldSum[cat]||0)+p.sold_rate;
        catSoldCnt[cat]=(catSoldCnt[cat]||0)+1;
      }
    });
    const catKeys=Object.keys(catDelivery).sort((a,b)=>{
      const sumA=Object.values(catDelivery[a]).reduce((s,v)=>s+v,0);
      const sumB=Object.values(catDelivery[b]).reduce((s,v)=>s+v,0);
      return sumB-sumA;
    });
    const dtKeys=[...allDeliveryTypes].sort();
    const stackedDatasets=dtKeys.map((dt,i)=>({
      label:dt,data:catKeys.map(cat=>catDelivery[cat][dt]||0),
      backgroundColor:deliveryColors[dt]||chartColors[i%chartColors.length],
      yAxisID:'y'
    }));

    // Add sold rate line overlay if we have data
    if(trendPeriod==='today'){
      stackedDatasets.push({
        label:'평균 소진율',type:'line',
        data:catKeys.map(cat=>catSoldCnt[cat]?Math.round(catSoldSum[cat]/catSoldCnt[cat]):0),
        borderColor:'#ff4466',backgroundColor:'transparent',
        borderWidth:2,pointRadius:4,tension:.3,yAxisID:'y1'
      });
    }

    renderChart('chartCatDelivery','bar',{labels:catKeys,datasets:stackedDatasets},{
      stacked:true,indexAxis:'y',
      scales:{
        y1:trendPeriod==='today'?{position:'top',ticks:{callback:v=>v+'%'},grid:{display:false}}:undefined
      }
    });

    // 2. Discount distribution histogram
    const discBuckets=[0,0,0,0,0];// 0-20, 20-40, 40-60, 60-80, 80-100
    trendProducts.forEach(p=>{
      const r=p.discount_rate||0;
      const idx=Math.min(Math.floor(r/20),4);
      discBuckets[idx]++;
    });
    renderChart('chartDiscountDist','bar',{
      labels:['0-20%','20-40%','40-60%','60-80%','80-100%'],
      datasets:[{label:'상품 수',data:discBuckets,backgroundColor:['#3d8ef8','#00d4b4','#ffbe3d','#ff8c42','#ff4466'],borderRadius:4}]
    });

    // 3. Sold rate distribution histogram
    const soldBuckets=[0,0,0,0,0];
    trendProducts.forEach(p=>{
      const r=p.sold_rate||0;
      const idx=Math.min(Math.floor(r/20),4);
      soldBuckets[idx]++;
    });
    renderChart('chartSoldDist','bar',{
      labels:['0-20%','20-40%','40-60%','60-80%','80-100%'],
      datasets:[{label:'상품 수',data:soldBuckets,backgroundColor:['#00e09a','#00d4b4','#ffbe3d','#ff8c42','#ff4466'],borderRadius:4}]
    });

    // 4. Category pie
    const catCount={};
    trendProducts.forEach(p=>{const c=p.category||'기타';catCount[c]=(catCount[c]||0)+1;});
    const catSorted=Object.entries(catCount).sort((a,b)=>b[1]-a[1]);
    renderChart('chartCategory','doughnut',{
      labels:catSorted.map(([k,v])=>k+' ('+Math.round(v/total*100)+'%)'),
      datasets:[{data:catSorted.map(([,v])=>v),backgroundColor:chartColors}]
    });

    // 5. Delivery pie
    const dlCount={};
    trendProducts.forEach(p=>{const d=p.delivery_type||'미확인';dlCount[d]=(dlCount[d]||0)+1;});
    const dlSorted=Object.entries(dlCount).sort((a,b)=>b[1]-a[1]);
    renderChart('chartDelivery','doughnut',{
      labels:dlSorted.map(([k,v])=>k+' ('+Math.round(v/total*100)+'%)'),
      datasets:[{data:dlSorted.map(([,v])=>v),backgroundColor:dlSorted.map(([k])=>deliveryColors[k]||'#304560')}]
    });

    // 6. Daily trends (7d/30d/all only)
    if(trendPeriod!=='today'){
      const sinceISO=sinceStr+'T00:00:00Z';
      const{data:dailySnaps}=await sb
        .from('goldbox_snapshots').select('crawled_at,discount_rate,sold_rate')
        .gte('crawled_at',sinceISO).order('crawled_at',{ascending:true});

      if(dailySnaps&&dailySnaps.length){
        const dayMap={};
        dailySnaps.forEach(s=>{
          const day=s.crawled_at.substring(0,10);
          if(!dayMap[day]) dayMap[day]={discounts:[],solds:[]};
          dayMap[day].discounts.push(s.discount_rate);
          dayMap[day].solds.push(s.sold_rate);
        });
        const days=Object.keys(dayMap).sort();
        const avgDiscounts=days.map(d=>Math.round(dayMap[d].discounts.reduce((a,b)=>a+b,0)/dayMap[d].discounts.length));
        const avgSolds=days.map(d=>Math.round(dayMap[d].solds.reduce((a,b)=>a+b,0)/dayMap[d].solds.length));
        const labels=days.map(d=>d.substring(5));

        renderChart('chartDiscount','line',{labels,datasets:[{label:'평균 할인율 (%)',data:avgDiscounts,borderColor:'#3d8ef8',backgroundColor:'rgba(61,142,248,.1)',fill:true,tension:.3}]});
        renderChart('chartSold','line',{labels,datasets:[{label:'평균 소진율 (%)',data:avgSolds,borderColor:'#00d4b4',backgroundColor:'rgba(0,212,180,.1)',fill:true,tension:.3}]});
      }
    }else{
      const avgD=Math.round(trendProducts.reduce((s,p)=>s+(p.discount_rate||0),0)/total);
      const avgS=Math.round(trendProducts.reduce((s,p)=>s+(p.sold_rate||0),0)/total);
      renderChart('chartDiscount','bar',{labels:['오늘 평균'],datasets:[{label:'할인율 (%)',data:[avgD],backgroundColor:'#3d8ef8',borderRadius:6}]});
      renderChart('chartSold','bar',{labels:['오늘 평균'],datasets:[{label:'소진율 (%)',data:[avgS],backgroundColor:'#00d4b4',borderRadius:6}]});
    }
  }catch(err){console.error('트렌드 로드 오류:',err);}
}

function renderChart(canvasId,type,data,opts){
  if(charts[canvasId]) charts[canvasId].destroy();
  const canvas=document.getElementById(canvasId);
  if(!canvas) return;
  const ctx=canvas.getContext('2d');
  const isDark=document.documentElement.dataset.theme!=='light';
  const textColor=isDark?'#c8daf0':'#2d4a6a';
  const gridColor=isDark?'rgba(26,48,80,.4)':'rgba(180,200,220,.4)';
  const options={responsive:true,maintainAspectRatio:false,
    indexAxis:opts&&opts.indexAxis||'x',
    plugins:{legend:{labels:{color:textColor,font:{family:'sans-serif',size:12},padding:12}}}
  };
  if(type==='bar'||type==='line'){
    const stacked=opts&&opts.stacked;
    options.scales={
      x:{stacked:!!stacked,ticks:{color:textColor,font:{size:11}},grid:{color:gridColor}},
      y:{stacked:!!stacked,ticks:{color:textColor,font:{size:11}},grid:{color:gridColor}}
    };
    // Add secondary axis if provided
    if(opts&&opts.scales&&opts.scales.y1){
      options.scales.y1={...opts.scales.y1,ticks:{...opts.scales.y1.ticks,color:textColor,font:{size:11}},grid:{display:false}};
    }
  }
  charts[canvasId]=new Chart(ctx,{type,data,options});
}

function classifyCategory(name){

  // Brand → Category (highest priority)
  for(const[bk,cat] of Object.entries(BRAND_CAT)){if(n.includes(bk.toLowerCase())) return cat;}
  const m=(kws)=>kws.some(k=>n.includes(k));
  // Priority order: specific first
  if(m(['우유','계란','달걀','두부','요거트','치즈','버터','과일','채소','야채','고기','돼지','소고기','닭고기','연어','새우','김치','반찬','두유','샐러드','복숭아','포도','사과','딸기','귤','바나나','삼겹살','불고기','한우','토마토','감자','양파','브로콜리','당근','파프리카','시금치','블루베리','아보카도'])) return '신선식품';

  if(m(['입장권','이용권','여행','호텔','숙박','리조트','항공','티켓','파크','놀이공원','워터파크','스파','골프장','바우처'])) return '여행/티켓';

  // Living BEFORE beauty (화장지 → not 뷰티)
  if(m(['세제','섬유유연제','청소','걸레','수세미','스펀지','휴지','화장지','키친타올','물티슈','티슈','면봉','비누','핸드워시','손세정','방향제','탈취','습기제거','우산','마스크','멀티탭','건전지'])) return '생활용품';
  // Home BEFORE sports (프라이팬 → not 스포츠)
  if(m(['수건','타올','이불','베개','매트리스','침대','커튼','러그','수납','선반','행거','옷걸이','바구니','냄비','프라이팬','도마','그릇','접시','컵','텀블러','보온병','밀폐용기','지퍼백','건조대','쓰레기봉투','토퍼','메모리폼','쿠션','소파','의자','책상','테이블','조리도구','그림','액자'])) return '홈/키친';

  return '기타';
}

function toggleTheme(){
  const html=document.documentElement;
  html.dataset.theme=html.dataset.theme==='dark'?'light':'dark';
  localStorage.setItem('gb-theme',html.dataset.theme);
}
